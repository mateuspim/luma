name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go build ./...
      - run: go test ./...

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o dist/luma .
          cd dist
          tar czf luma-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz luma ../config.toml.example ../README.md
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/luma-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
          generate_release_notes: true

  latest:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X main.version=latest" -o dist/luma .
          cd dist
          tar czf luma-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz luma ../config.toml.example ../README.md
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          prerelease: true
          name: Latest (master)
          files: dist/luma-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
